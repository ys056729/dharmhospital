<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharam Hospital | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>

<body class="bg-slate-50 min-h-screen pb-10">

<!-- Navigation -->
<nav class="bg-teal-700 text-white p-4 shadow-lg mb-6 sticky top-0 z-50">
    <div class="container mx-auto flex flex-wrap justify-between items-center gap-2">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span class="bg-white rounded-lg p-1">🏥</span> 
            <span class="hidden sm:inline">Dharam Hospital Admin</span>
            <span class="sm:hidden text-lg">Dharam Admin</span>
        </h1>
        <div id="connectionStatus" class="text-[10px] uppercase tracking-wider bg-teal-800 px-3 py-1 rounded-full text-teal-200 border border-teal-600 flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-teal-400"></span> Initializing...
        </div>
    </div>
</nav>

<div class="container mx-auto px-4">
    <!-- Stats Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
            <div class="bg-blue-100 p-3 rounded-xl text-blue-600">👥</div>
            <div>
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Patients</h2>
                <p id="totalCount" class="text-2xl font-bold text-gray-800">0</p>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
            <div class="bg-orange-100 p-3 rounded-xl text-orange-600">⏳</div>
            <div>
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Pending Visit</h2>
                <p id="pendingCount" class="text-2xl font-bold text-orange-600">0</p>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
            <div class="bg-green-100 p-3 rounded-xl text-green-600">✅</div>
            <div>
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Completed</h2>
                <p id="doneCount" class="text-2xl font-bold text-green-600">0</p>
            </div>
        </div>
    </div>

    <!-- Search & Filters -->
    <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="relative w-full md:w-96">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔍</span>
            <input id="searchInput" type="text" placeholder="Search by name, phone or service..."
                class="block w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition-all text-sm">
        </div>
        <div class="flex items-center gap-3">
            <p id="lastUpdated" class="text-[10px] text-gray-400 font-mono text-right"></p>
            <button onclick="loadData()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors text-teal-600" title="Manual Refresh">🔄</button>
        </div>
    </div>

    <!-- Table Section -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-100">
                <thead class="bg-gray-50/50">
                    <tr>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-gray-500 uppercase tracking-wider">Date/Time</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-gray-500 uppercase tracking-wider">Patient Details</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-gray-500 uppercase tracking-wider">Contact</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-gray-500 uppercase tracking-wider">Service</th>
                        <th class="px-6 py-4 text-left text-[11px] font-bold text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-4 text-right text-[11px] font-bold text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-50">
                    <!-- Data Rows -->
                </tbody>
            </table>
        </div>
        <!-- Loader / Empty State -->
        <div id="loader" class="p-20 text-center">
            <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-teal-600 border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]" role="status"></div>
            <p class="mt-4 text-sm text-gray-500 font-medium">Fetching hospital records...</p>
        </div>
    </div>
</div>

<script>
/**
 * CONFIGURATION
 */// 🔐 Access Control
//🔐 Login

const password = prompt("Enter Admin Password:");

if(password !== "Admin123"){

    document.body.innerHTML = "❌ Access Denied";

    throw new Error("Unauthorized");

}
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnrwzy9A2MpbEERQJJFfmk2jUJsTdek50ags4fHIP4I94HwVDQ7ltHQ-lmq9ofizMglH-OofNVcCtY/pub?gid=0&single=true&output=csv";
const SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbyMO4Cv_ruYG_PfJebxemlVJRefYPKYy56SWy-zGzcsb4hyi4g8v7MJyj4UjnPyZ0IBlg/exec"; // REPLACE THIS URL

let patientData = [];
let isSyncing = false;

// 🔐 Authentication Guard
if (sessionStorage.getItem("admin_auth") !== "true") {
    const pw = prompt("Dharam Hospital - Secure Access\nEnter Password:");
    if (pw === AUTH_PASS) {
        sessionStorage.setItem("admin_auth", "true");
    } else {
        document.body.innerHTML = `
            <div class="flex items-center justify-center h-screen bg-red-50 text-center px-4">
                <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full">
                    <span class="text-6xl block mb-4">🚫</span>
                    <h2 class="text-2xl font-bold text-red-600 mb-2">Access Denied</h2>
                    <p class="text-gray-500 text-sm mb-6">Unauthorized terminal access detected.</p>
                    <button onclick="location.reload()" class="w-full bg-red-600 text-white py-2 rounded-xl font-semibold">Try Again</button>
                </div>
            </div>`;
        throw new Error("Unauthorized Access Attempt");
    }
}

/**
 * CORE LOGIC
 */

async function loadData() {
    const connStatus = document.getElementById("connectionStatus");
    connStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-yellow-400 pulse"></span> Fetching...`;

    try {
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        
        // CSV Parsing logic
        const rows = text.trim().split(/\r?\n/).slice(1);
        patientData = rows.map(row => {
            return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
        }).filter(r => r.length >= 3 && r[1] !== "");

        document.getElementById("loader").classList.add("hidden");
        document.getElementById("lastUpdated").innerText = "Last Updated: " + new Date().toLocaleTimeString();
        connStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-400"></span> Live Sync Active`;
        
        renderTable(patientData);
        updateStats();
    } catch (err) {
        console.error("Fetch Error:", err);
        connStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-red-500"></span> Connection Error`;
    }
}

function updateStats() {
    let total = patientData.length;
    let pending = 0;
    let done = 0;

    patientData.forEach(p => {
        const phone = p[2];
        const status = localStorage.getItem('status_' + phone) || "Pending";
        status === "Pending" ? pending++ : done++;
    });

    document.getElementById("totalCount").innerText = total;
    document.getElementById("pendingCount").innerText = pending;
    document.getElementById("doneCount").innerText = done;
}

function renderTable(data) {
    const tableBody = document.getElementById("tableBody");
    const searchTerm = document.getElementById("searchInput").value.toLowerCase();
    tableBody.innerHTML = "";

    const filtered = data.filter(p => {
        return `${p[1]} ${p[2]} ${p[4]}`.toLowerCase().includes(searchTerm);
    });

    if (filtered.length === 0 && !document.getElementById("loader").classList.contains("hidden")) {
        // Just let it show empty if not loading
    }

    [...filtered].reverse().forEach(cols => {
        const [date, name, phone, age, service] = cols;
        const currentStatus = localStorage.getItem('status_' + phone) || "Pending";
        
        const tr = document.createElement("tr");
        tr.className = "hover:bg-teal-50/30 transition-colors group";

        tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-[11px] text-gray-400 font-mono">${date || 'N/A'}</td>
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm font-semibold text-gray-900">${name}</div>
                <div class="text-[11px] text-gray-500">${age || '-'} Years</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${phone}</td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="text-[11px] font-medium bg-gray-100 px-2 py-0.5 rounded text-gray-600 border border-gray-200">${service || 'General'}</span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${
                    currentStatus === 'Done' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'
                }">${currentStatus}</span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-1">
                <button onclick="toggleStatus('${phone}')" class="inline-flex items-center px-3 py-1.5 border border-gray-200 shadow-sm text-[11px] rounded-lg font-bold text-gray-700 bg-white hover:bg-teal-600 hover:text-white hover:border-teal-600 transition-all">
                    ${currentStatus === 'Done' ? 'UNDO' : 'MARK DONE'}
                </button>
                <div class="inline-flex gap-2 ml-2 opacity-60 group-hover:opacity-100 transition-opacity">
                    <a href="https://wa.me/91${phone}?text=Hello ${encodeURIComponent(name)}, your appointment at Dharam Hospital is confirmed." 
                       target="_blank" class="text-green-500 text-lg hover:scale-110 transition-transform">💬</a>
                    <a href="tel:${phone}" class="text-blue-500 text-lg hover:scale-110 transition-transform">📞</a>
                </div>
            </td>
        `;
        tableBody.appendChild(tr);
    });
}

/**
 * DATA PERSISTENCE
 */

async function toggleStatus(phone) {
    if (isSyncing) return;
    
    const current = localStorage.getItem('status_' + phone) || "Pending";
    const nextStatus = current === "Pending" ? "Done" : "Pending";

    // 1. Optimistic Update (Immediate)
    localStorage.setItem('status_' + phone, nextStatus);
    renderTable(patientData);
    updateStats();

    // 2. Sync to Spreadsheet (Backend)
    if (SCRIPT_API_URL !== "YOUR_GOOGLE_SCRIPT_WEB_APP_URL") {
        isSyncing = true;
        document.getElementById("connectionStatus").innerHTML = `<span class="h-2 w-2 rounded-full bg-blue-400 pulse"></span> Syncing to Sheet...`;
        
        try {
            await fetch(SCRIPT_API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ phone: phone, status: nextStatus })
            });
            console.log("Sheet Updated Successfully");
        } catch (err) {
            console.warn("Sheet sync failed, but saved locally:", err);
        } finally {
            isSyncing = false;
            document.getElementById("connectionStatus").innerHTML = `<span class="h-2 w-2 rounded-full bg-green-400"></span> Live Sync Active`;
        }
    }
}

// Event Listeners
document.getElementById("searchInput").addEventListener("input", () => renderTable(patientData));

// Startup
loadData();
setInterval(loadData, 20000); // 20s refresh

</script>
</body>
</html>
